<!DOCTYPE html>

<html>

<head>

<title>Edit Prediction</title>

</head>

<body>

<h1>Edit Prediction</h1>

<form method="POST">

Quantity

<input
type="number"
step="0.01"
name="quantity"
value="{{ prediction.quantity }}">

<br><br>

Unit Price

<input
type="number"
step="0.01"
name="unit_price"
value="{{ prediction.unit_price }}">

<br><br>

Predicted Profit

<input
type="number"
step="0.01"
name="predicted_profit"
value="{{ prediction.predicted_profit }}">

<br><br>

<button>

Update

</button>

</form>

</body>

</html>
