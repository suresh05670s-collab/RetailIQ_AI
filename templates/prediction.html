<!DOCTYPE html>
<html>

<head>
    <title>AI Sales Prediction</title>
</head>

<body>

<h1>RetailIQ AI Sales Prediction</h1>

<form method="POST">

Quantity

<input type="number" name="quantity" required>

<br><br>

Unit Price

<input type="number" step="0.01" name="unit_price" required>

<br><br>

<button type="submit">
Predict Profit
</button>

</form>

{% if prediction %}

<h2>

Predicted Profit

₹{{ prediction }}

</h2>

{% endif %}

</body>

</html>
