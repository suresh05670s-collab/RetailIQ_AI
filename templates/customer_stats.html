<!DOCTYPE html>
<html>
<head>
<title>Customer Statistics</title>
</head>
<body>

<h1>Customer Statistics</h1>

<h2>Customers by Region</h2>

<table border="1">

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">
Back to Dashboard
</a>

</body>
</html>
