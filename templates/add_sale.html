<!DOCTYPE html>
<html>
<head>
    <title>Add Sale</title>
</head>
<body>

<h1>Add New Sale</h1>

<form method="POST">

<label>Invoice</label><br>
<input type="text" name="invoice" required><br><br>

<label>Product Name</label><br>
<input type="text" name="product_name" required><br><br>

<label>Customer Name</label><br>
<input type="text" name="customer_name" required><br><br>

<label>Quantity</label><br>
<input type="number" name="quantity" required><br><br>

<label>Unit Price</label><br>
<input type="number" name="unit_price" required><br><br>

<label>Profit</label><br>
<input type="number" name="profit" required><br><br>

<label>Sale Date</label><br>
<input type="date" name="sale_date" required><br><br>

<button type="submit">Save Sale</button>

</form>

<br>

<a href="/sales">Back to Sales</a>

</body>
</html>
